# Continuous proof: run the published EvoOM Guard on all four scenarios and
# assert the verdict of each (via the JSON, not the exit code — three of the
# four intentionally exit non-zero). Green means the demo's claims still hold.
name: Demo proof suite
on:
  push:
  workflow_dispatch:
jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install the demo project's test runner
        run: pip install -q pytest
      - name: Get the published EvoOM Guard (v3.4.0) and VERIFY its checksum
        # The release ships SHA256SUMS next to the artifact — the proof chain
        # verifies it, so a green run also proves release provenance, not just
        # verdict behaviour.
        run: |
          curl -sSL -o evo-guard.pyz  https://github.com/EvoRiseKsa/EvoOM-Guard-m/releases/download/v3.4.0/evo-guard.pyz
          curl -sSL -o SHA256SUMS     https://github.com/EvoRiseKsa/EvoOM-Guard-m/releases/download/v3.4.0/SHA256SUMS
          sha256sum -c SHA256SUMS
      - name: Prove the four scenarios
        run: |
          set -u
          check() {  # $1=patch  $2=expected verdict  $3=extra args
            python evo-guard.pyz guard ./repo --patch "$1" $3 --json out.json >/dev/null 2>&1 || true
            got=$(python -c "import json,sys;print(json.load(open('out.json'))['verdict'])")
            if [ "$got" != "$2" ]; then echo "::error::$1 expected $2 but got $got"; exit 1; fi
            echo "OK  $1  ->  $got"
          }
          check patches/1-honest-fix.txt      PASS     ""
          check patches/2-edit-tests.txt      REJECTED ""
          check patches/3-fake-stdout.txt     FAIL     ""
          check patches/4-blackbox-forgery.txt FAIL    "--verifier-pack ./pack --blackbox"
          echo "All four scenarios verified against the published release."

      - name: Prove the v3.3 policy-consistency claims
        run: |
          set -u
          # 5) A gate on a GREEN base is honestly refused: the honest fix passes
          #    the suite, but the fix is NOT demonstrated (this demo's base is
          #    green) -> FAIL fix_not_demonstrated.
          python evo-guard.pyz guard ./repo --patch patches/1-honest-fix.txt             --require-demonstrated-fix --json out5.json >/dev/null 2>&1 || true
          test "$(python -c "import json;print(json.load(open('out5.json'))['reason_code'])")" = "fix_not_demonstrated"
          echo "OK  green base + require-demonstrated-fix -> FAIL fix_not_demonstrated"
          # 6) An unenforceable gate combination is refused, never dropped.
          python evo-guard.pyz guard ./repo --patch patches/1-honest-fix.txt             --require-demonstrated-fix --blackbox --json out6.json >/dev/null 2>&1 || true
          test "$(python -c "import json;print(json.load(open('out6.json'))['reason_code'])")" = "policy_requirement_unsupported"
          echo "OK  gate + blackbox -> ERROR policy_requirement_unsupported"
          # 7) A broken protected policy file stops the run (exit 2, fail-closed).
          echo '{"require_report_isolation": "external"}' > bad-config.json
          if python evo-guard.pyz guard ./repo --patch patches/1-honest-fix.txt                --config bad-config.json >/dev/null 2>&1; then
            echo "::error::broken config did not stop the run"; exit 1
          fi
          echo "OK  broken .evoguard.json -> fail-closed"
          # 8) The judge-owned pack validates as a versioned behaviour contract.
          python evo-guard.pyz pack-doctor ./pack
          echo "All v3.3 policy-consistency claims verified against the published release."

      - name: Prove v3.4 pack identity and the mandatory independent phase
        run: |
          set -euo pipefail
          PACK_SHA="$(tr -d '[:space:]' < pack-native.v2.sha256)"
          OBSERVED="$(python evo-guard.pyz pack-doctor ./pack-native --json | python -c 'import json,sys; print(json.load(sys.stdin)["pack_sha256"])')"
          test "$OBSERVED" = "$PACK_SHA"

          # The pinned, judge-owned pack passes independently after the repo suite.
          python evo-guard.pyz guard ./repo --patch patches/1-honest-fix.txt \
            --verifier-pack ./pack-native \
            --expect-verifier-pack-sha256 "$PACK_SHA" \
            --json out-v34-pass.json >/dev/null
          python - <<'PY'
          import json
          result = json.load(open("out-v34-pass.json", encoding="utf-8"))
          pin = open("pack-native.v2.sha256", encoding="ascii").read().strip()
          att = result["attestation"]
          assert result["verdict"] == "PASS"
          assert result["verdict_source"] == "composite:repo+verifier-pack"
          assert (result["tests_passed"], result["tests_total"]) == (3, 3)
          assert (att["verifier_pack_tests_passed"], att["verifier_pack_tests_total"]) == (1, 1)
          assert att["verifier_pack_sha256"] == pin
          assert att["verifier_pack_digest_format"] == "EVOGUARD_PACK_V2"
          assert att["effective_policy"]["expect_verifier_pack_sha256"] == pin
          PY

          # The repo suite is green (2 tests), but the separate pack rejects the
          # forged CLI. The composed verdict must therefore be FAIL (2/3).
          python evo-guard.pyz guard ./repo --patch patches/4-blackbox-forgery.txt \
            --verifier-pack ./pack-native \
            --expect-verifier-pack-sha256 "$PACK_SHA" \
            --json out-v34-pack-fail.json >/dev/null 2>&1 || true
          python - <<'PY'
          import json
          result = json.load(open("out-v34-pack-fail.json", encoding="utf-8"))
          att = result["attestation"]
          assert result["verdict"] == "FAIL"
          assert result["verdict_source"] == "composite:repo+verifier-pack"
          assert (result["tests_passed"], result["tests_total"]) == (2, 3)
          assert (att["verifier_pack_tests_passed"], att["verifier_pack_tests_total"]) == (0, 1)
          PY

          # One changed byte under the same expected pin is refused before any
          # candidate test command runs.
          TAMPERED="$RUNNER_TEMP/evoguard-pack-tampered"
          cp -R pack-native "$TAMPERED"
          printf '\n# changed after policy review\n' >> "$TAMPERED/test_policy.py"
          python evo-guard.pyz guard ./repo --patch patches/1-honest-fix.txt \
            --verifier-pack "$TAMPERED" \
            --expect-verifier-pack-sha256 "$PACK_SHA" \
            --json out-v34-tamper.json >/dev/null 2>&1 || true
          python - <<'PY'
          import json
          result = json.load(open("out-v34-tamper.json", encoding="utf-8"))
          assert result["verdict"] == "ERROR"
          assert result["reason_code"] == "verifier_pack_identity_mismatch"
          assert result["test_command_ran"] is False
          PY
          echo "All v3.4 pack identity and mandatory-phase claims verified."

      - name: Prove setup, suite, and pack use one exact Docker image ID
        run: |
          set -euo pipefail
          PACK_SHA="$(tr -d '[:space:]' < pack-native.v2.sha256)"
          IMAGE="evoguard-demo-judge:3.4.0"
          docker build --file .github/docker/Dockerfile.judge --tag "$IMAGE" .
          docker image inspect "$IMAGE" --format '{{.Id}}' > expected-image-id.txt

          python evo-guard.pyz guard ./repo --patch patches/1-honest-fix.txt \
            --verifier-pack ./pack-native \
            --expect-verifier-pack-sha256 "$PACK_SHA" \
            --isolation docker --docker-image "$IMAGE" \
            --config .github/evoguard-docker.json \
            --json out-v34-docker.json >/dev/null
          python - <<'PY'
          import json
          result = json.load(open("out-v34-docker.json", encoding="utf-8"))
          expected = open("expected-image-id.txt", encoding="ascii").read().strip()
          att = result["attestation"]
          assert result["verdict"] == "PASS"
          assert att["isolation_evidence"]["image_digest"] == expected
          assert att["setup_isolation"] == "docker"
          assert result["assurance"]["setup_isolation"] == "docker"
          assert result["assurance"]["suite_isolation"] == "docker"
          assert (att["verifier_pack_tests_passed"], att["verifier_pack_tests_total"]) == (1, 1)
          PY
          echo "Exact resolved Docker image identity verified: $(cat expected-image-id.txt)"

  node-proof:
    # The realistic-fixture proof: a Node WORKSPACES monorepo judged by the
    # published release through the structured vitest oracle (junit+exit).
    # Scenario 4 is the load-bearing one: package.json test-script tampering is
    # NEUTRALIZED by harness-field restoration — vitest still runs, the bug
    # still fails, the forged script never executes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "22"
      - name: Get + VERIFY the published EvoOM Guard
        run: |
          curl -sSL -o evo-guard.pyz https://github.com/EvoRiseKsa/EvoOM-Guard-m/releases/download/v3.4.0/evo-guard.pyz
          curl -sSL -o SHA256SUMS    https://github.com/EvoRiseKsa/EvoOM-Guard-m/releases/download/v3.4.0/SHA256SUMS
          sha256sum -c SHA256SUMS
      - name: Prove the four Node-workspace scenarios
        run: |
          set -u
          check() {  # $1=patch  $2=expected verdict
            python evo-guard.pyz guard ./node-workspace --patch "$1"               --config node-workspace/.evoguard.json --json out.json >/dev/null 2>&1 || true
            got=$(python -c "import json;print(json.load(open('out.json'))['verdict'])")
            if [ "$got" != "$2" ]; then echo "::error::$1 expected $2 but got $got"; exit 1; fi
            echo "OK  $1  ->  $got"
          }
          check patches-node/1-honest-fix.txt          PASS
          check patches-node/2-edit-colocated-test.txt REJECTED
          check patches-node/3-vitest-config-edit.txt  REJECTED
          check patches-node/4-pkgjson-test-tamper.txt FAIL
          # Scenario 4 depth: the verdict must come from the STRUCTURED vitest
          # oracle (the restored script really ran), not from the forged echo.
          python evo-guard.pyz guard ./node-workspace --patch patches-node/4-pkgjson-test-tamper.txt             --config node-workspace/.evoguard.json --json out4.json >/dev/null 2>&1 || true
          test "$(python -c "import json;print(json.load(open('out4.json'))['verdict_source'])")" = "junit+exit"
          echo "All Node-workspace scenarios verified against the published release."
