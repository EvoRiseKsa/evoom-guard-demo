# Gates every PR to this demo with the PUBLISHED EvoOM Guard action, pinned to a tag.
name: EvoOM Guard
on: pull_request
permissions:
  contents: read
  pull-requests: write
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }               # Guard needs the base commit to diff
      - uses: EvoRiseKsa/EvoOM-Guard-m@58561f898613d860f9270ffdd06d42c4023306da # v3.4.0
        with:
          test-command: "python -m pytest -q"
          comment: "true"
